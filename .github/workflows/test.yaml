name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # execnb 0.2.x removed execnb.nbio, which nbdev<3 still imports. Pin it
      # (the fastai action runs `pip install -U 'nbdev<3'` internally; pip honors
      # PIP_CONSTRAINT even there). See ci-constraints.txt.
      PIP_CONSTRAINT: ${{ github.workspace }}/ci-constraints.txt
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Use nbdev-ci action
      uses: fastai/workflows/nbdev-ci@master
      with:
        version: '3.11'  # scipy<=1.10.1 (pinned in settings.ini) has no wheels for Python 3.12

    - name: Install SEPIA
      run: |
        git clone https://github.com/lanl/SEPIA.git
        cd SEPIA
        pip install -e .[sepia]  # Install SEPIA package

